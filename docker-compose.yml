version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: saathi-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - backend
      - mongodb
    networks:
      - saathi-network
    restart: unless-stopped

  # Express Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: saathi-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/saathi
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - mongodb
    networks:
      - saathi-network
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: saathi-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=saathi
    volumes:
      - mongodb_data:/data/db
    networks:
      - saathi-network
    restart: unless-stopped

networks:
  saathi-network:
    driver: bridge

volumes:
  mongodb_data:
