version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: saathi-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - saathi-network
    restart: unless-stopped

  # Express Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: saathi-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    networks:
      - saathi-network
    restart: unless-stopped

networks:
  saathi-network:
    driver: bridge
